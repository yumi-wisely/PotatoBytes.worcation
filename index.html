<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotatoPlan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap');
        .logo-font { font-family: 'Dela Gothic One', cursive; }
        body { background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes bounce-in { 0% { transform: translateY(100%); } 100% { transform: translateY(0); } }
        .animate-bounce-in { animation: bounce-in 0.3s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Firebase設定（あなたの設定済み） ---
        const firebaseConfig = {
          apiKey: "AIzaSyCcRLNQUUqgoIeLrudKJ9IsClwuc93WwHM",
          authDomain: "potatoplan-9dedc.firebaseapp.com",
          projectId: "potatoplan-9dedc",
          storageBucket: "potatoplan-9dedc.firebasestorage.app",
          messagingSenderId: "759154119060",
          appId: "1:759154119060:web:665a705e2f848d4dce3f81",
          databaseURL: "https://potatoplan-9dedc-default-rtdb.firebaseio.com"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const App = () => {
            const [view, setView] = useState('TripList');
            const [activeTab, setActiveTab] = useState('Trip');
            const [user, setUser] = useState(null);
            const [potatoId, setPotatoId] = useState(null);
            const [events, setEvents] = useState([]);
            const [friends, setFriends] = useState([]);
            const [tripMembers, setTripMembers] = useState([{ id: 'ALL', name: '全員' }]);
            const [visibleMembers, setVisibleMembers] = useState(['ALL']);
            const [showAddModal, setShowAddModal] = useState(false);
            const [showSummonModal, setShowSummonModal] = useState(false);
            const [summonId, setSummonId] = useState('');
            const [newPlan, setNewPlan] = useState({ time: '12:00', title: '', type: 'SHARED' });

            // ログイン監視
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const doc = await db.collection('users').doc(u.uid).get();
                        if (doc.exists()) {
                            const data = doc.data();
                            setPotatoId(data.potatoId);
                            const me = { id: data.potatoId, name: u.displayName, photo: u.photoURL };
                            setTripMembers(prev => prev.find(m => m.id === me.id) ? prev : [...prev, me]);
                            setVisibleMembers(prev => prev.includes(me.id) ? prev : [...prev, me.id]);
                        }
                    } else { setView('TripList'); }
                });
                return () => unsubscribe();
            }, []);

            // 予定取得
            useEffect(() => {
                if (view === 'MainApp') {
                    const unsubscribe = db.collection('events').orderBy('time').onSnapshot(s => {
                        setEvents(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                    return () => unsubscribe();
                }
            }, [view]);

            // アイコン描画の安全な実行
            useEffect(() => {
                setTimeout(() => {
                    if (window.lucide) window.lucide.createIcons();
                }, 100);
            }, [view, activeTab, showSummonModal, showAddModal, friends, tripMembers, events]);

            const handleAddFriend = async () => {
                if (!summonId) return;
                const s = await db.collection('users').where('potatoId', '==', summonId.toUpperCase()).get();
                if (s.empty) { alert("ポテト不在🍟"); return; }
                const f = s.docs.data();
                const newF = { id: f.potatoId, name: f.displayName, photo: f.photoURL };
                setFriends(prev => prev.find(x => x.id === newF.id) ? prev : [...prev, newF]);
                setSummonId('');
                alert("仲間に追加しました！");
            };

            const summonToTrip = (f) => {
                setTripMembers(prev => prev.find(m => m.id === f.id) ? prev : [...prev, f]);
                setVisibleMembers(prev => [...prev, f.id]);
                setShowSummonModal(false);
            };

            if (view === 'TripList') {
                return (
                    <div className="max-w-md mx-auto h-screen bg-slate-50 flex flex-col p-6 overflow-y-auto">
                        <h1 className="text-4xl logo-font text-slate-800 mb-8 mt-10">My Trips</h1>
                        <div className="bg-yellow-400 p-6 rounded-[32px] shadow-lg mb-10" onClick={() => setView('MainApp')}>
                            <h3 className="text-2xl font-black italic uppercase tracking-tighter">HAKODATE</h3>
                            <p className="text-xs font-bold opacity-60">MEMBERS: {tripMembers.length - 1} POTATOES</p>
                        </div>
                        <h2 className="text-xl font-black mb-4 flex items-center gap-2"><i data-lucide="users"></i> FRIENDS</h2>
                        <div className="space-y-3 mb-20">
                            {friends.map(f => (
                                <div key={f.id} className="bg-white p-3 rounded-2xl flex items-center justify-between border shadow-sm">
                                    <div className="flex items-center gap-3">
                                        <img src={f.photo} className="w-10 h-10 rounded-full border" />
                                        <span className="font-bold text-sm">{f.name}</span>
                                    </div>
                                    <span className="text-[10px] font-mono bg-slate-100 px-2 py-1 rounded">{f.id}</span>
                                </div>
                            ))}
                            <div className="mt-4 flex gap-2">
                                <input type="text" value={summonId} onChange={e => setSummonId(e.target.value)} placeholder="PBID-XXXX" className="flex-1 bg-white border-2 p-3 rounded-xl text-sm font-bold uppercase" />
                                <button onClick={handleAddFriend} className="bg-slate-900 text-white px-4 rounded-xl font-bold text-xs uppercase">追加</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto h-screen bg-white flex flex-col shadow-2xl relative overflow-hidden">
                    <header className="bg-yellow-400 p-6 text-slate-800 flex items-center justify-between">
                        <button onClick={() => setView('TripList')}><i data-lucide="chevron-left"></i></button>
                        <h1 className="text-2xl logo-font tracking-tighter uppercase">Hakodate</h1>
                        <button onClick={() => setShowSummonModal(true)} className="bg-slate-900 text-white text-[10px] px-3 py-1 rounded-full font-black">召喚</button>
                    </header>

                    <main className="flex-1 overflow-y-auto bg-white pb-24">
                        {activeTab === 'ID' ? (
                            <div className="p-8 flex flex-col items-center">
                                <h2 className="text-xl font-black mb-6 italic uppercase tracking-widest">Profile</h2>
                                {user && (
                                    <div className="bg-yellow-50
