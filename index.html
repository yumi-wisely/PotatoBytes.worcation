<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotatoPlan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap');
        .logo-font { font-family: 'Dela Gothic One', cursive; }
        body { background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ⚠️ 自分のFirebase設定をここに貼る ⚠️ ---
        const firebaseConfig = {
          apiKey: "AIzaSyCcRLNQUUqgoIeLrudKJ9IsClwuc93WwHM",
          authDomain: "potatoplan-9dedc.firebaseapp.com",
          databaseURL: "https://potatoplan-9dedc-default-rtdb.firebaseio.com",
          projectId: "potatoplan-9dedc",
          storageBucket: "potatoplan-9dedc.firebasestorage.app",
          messagingSenderId: "759154119060",
          appId: "1:759154119060:web:665a705e2f848d4dce3f81",
          measurementId: "G-EXZLG8WCLQ"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const App = () => {
            const [view, setView] = useState('TripList'); // TripList or MainApp
            const [activeTab, setActiveTab] = useState('Trip');
            const [user, setUser] = useState(null);
            const [potatoId, setPotatoId] = useState(null);
            const [events, setEvents] = useState([]);
            const [showAddModal, setShowAddModal] = useState(false);
            const [newPlan, setNewPlan] = useState({ time: '12:00', title: '', type: 'SHARED' });

            // ログイン監視
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const doc = await db.collection('users').doc(u.uid).get();
                        if (doc.exists()) setPotatoId(doc.data().potatoId);
                    } else { setUser(null); setPotatoId(null); setView('TripList'); }
                });
                return () => unsubscribe();
            }, []);

            // 予定をリアルタイム取得
            useEffect(() => {
                if (view === 'MainApp') {
                    const unsubscribe = db.collection('events').orderBy('time').onSnapshot(snapshot => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setEvents(data);
                    });
                    return () => unsubscribe();
                }
            }, [view]);

            useEffect(() => { lucide.createIcons(); }, [view, activeTab, showAddModal, events]);

            const handleAddPlan = async () => {
                if (!newPlan.title) return;
                await db.collection('events').add({
                    ...newPlan,
                    owner: newPlan.type === 'SHARED' ? 'ALL' : (user.displayName || 'Me'),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                setShowAddModal(false);
                setNewPlan({ time: '12:00', title: '', type: 'SHARED' });
            };

            // --- 🏠 TripList 画面 ---
            if (view === 'TripList') {
                return (
                    <div className="max-w-md mx-auto h-screen bg-slate-50 flex flex-col p-6">
                        <h1 className="text-4xl logo-font text-slate-800 mb-8 mt-10">My Trips</h1>
                        <div className="space-y-4 flex-1">
                            <div onClick={() => setView('MainApp')} className="bg-yellow-400 p-6 rounded-[32px] shadow-lg border-b-8 border-yellow-600 active:translate-y-1 active:border-b-4 transition-all cursor-pointer">
                                <h3 className="text-2xl font-black text-slate-900">函館 WORCATION</h3>
                                <p className="text-sm font-bold text-slate-700 opacity-70 mt-1">2026.03.25 - 03.30</p>
                                <div className="mt-4 flex -space-x-2">
                                    {.map(i => <div key={i} className="w-8 h-8 rounded-full bg-white border-2 border-yellow-500 flex items-center justify-center text-[10px] font-bold">P{i}</div>)}
                                    <div className="w-8 h-8 rounded-full bg-slate-800 text-white flex items-center justify-center text-[10px] font-bold">+7</div>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-[32px] border-2 border-dashed border-slate-300 flex items-center justify-center text-slate-400 font-bold">
                                <i data-lucide="plus" className="mr-2"></i> NEW TRIP
                            </div>
                        </div>
                    </div>
                );
            }

            // --- 📱 MainApp 画面 ---
            return (
                <div className="max-w-md mx-auto h-screen bg-white flex flex-col shadow-2xl relative overflow-hidden font-sans border-x border-slate-200">
                    <header className="bg-yellow-400 p-6 text-slate-800 shadow-sm flex items-center justify-between">
                        <button onClick={() => setView('TripList')}><i data-lucide="chevron-left"></i></button>
                        <h1 className="text-2xl logo-font tracking-tighter">HAKODATE</h1>
                        <button className="bg-slate-900 text-white text-[10px] px-3 py-1 rounded-full font-black">仲間の召喚</button>
                    </header>

                    <main className="flex-1 overflow-y-auto bg-white pb-24">
                        {activeTab === 'ID' ? (
                            <div className="p-8 flex flex-col items-center">
                                <h2 className="text-xl font-black mb-6">Profile & ID</h2>
                                {user ? (
                                    <div className="bg-yellow-50 p-8 rounded-[40px] border-2 border-yellow-200 w-full flex flex-col items-center">
                                        <img src={user.photoURL} className="w-20 h-20 rounded-full mb-4 border-4 border-white shadow-md"/>
                                        <p className="font-black text-lg">{user.displayName}</p>
                                        <p className="text-2xl font-black logo-font mt-6 bg-white px-4 py-2 rounded-xl shadow-sm border">{potatoId}</p>
                                        <button onClick={() => auth.signOut()} className="mt-10 text-[10px] text-slate-400 underline uppercase">Sign Out</button>
                                    </div>
                                ) : (
                                    <button onClick={() => setActiveTab('ID')} className="bg-slate-800 text-white p-4 rounded-full">Login Required</button>
                                )}
                            </div>
                        ) : (
                            <div className="p-8 border-l-4 border-yellow-100 ml-8 space-y-10 mt-4">
                                {events.map((event, i) => (
                                    <div key={i} className="relative">
                                        <div className={`absolute -left-[40px] top-1 w-6 h-6 rounded-full border-4 border-white shadow-sm ${event.type === 'SHARED' ? 'bg-yellow-400' : 'bg-blue-400'}`}></div>
                                        <div className="text-[10px] font-black text-slate-300 mb-2 uppercase tracking-widest">{event.time}</div>
                                        <div className={`p-5 rounded-[24px] shadow-sm border-2 ${event.type === 'SHARED' ? 'bg-slate-50 border-slate-100' : 'bg-blue-50 border-blue-100'}`}>
                                            <div className="text-md font-black text-slate-700">{event.title}</div>
                                            <div className="mt-2 text-[9px] font-bold text-slate-400 uppercase tracking-tighter">
                                                {event.type} {event.owner !== 'ALL' && `| BY ${event.owner}`}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Add Button */}
                    {activeTab === 'Trip' && (
                        <button onClick={() => setShowAddModal(true)} className="absolute bottom-28 right-6 w-16 h-16 bg-slate-900 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-transform z-20">
                            <i data-lucide="plus" size={32}></i>
                        </button>
                    )}

                    {/* Add Modal */}
                    {showAddModal && (
                        <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end">
                            <div className="w-full bg-white rounded-t-[40px] p-8 animate-bounce-in">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-black italic">NEW PLAN</h2>
                                    <button onClick={() => setShowAddModal(false)}><i data-lucide="x"></i></button>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Title</label>
                                        <input type="text" value={newPlan.title} onChange={e => setNewPlan({...newPlan, title: e.target.value})} className="w-full bg-slate-100 p-4 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-yellow-400 transition-all" placeholder="予定を入力..." />
                                    </div>
                                    <div className="flex gap-4">
                                        <div className="flex-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Time</label>
                                            <input type="time" value={newPlan.time} onChange={e => setNewPlan({...newPlan, time: e.target.value})} className="w-full bg-slate-100 p-4 rounded-2xl font-bold outline-none" />
                                        </div>
                                        <div className="flex-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Type</label>
                                            <select value={newPlan.type} onChange={e => setNewPlan({...newPlan, type: e.target.value})} className="w-full bg-slate-100 p-4 rounded-2xl font-bold outline-none">
                                                <option value="SHARED">全員予定</option>
                                                <option value="PERSONAL">自分の予定</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button onClick={handleAddPlan} className="w-full bg-yellow-400 p-5 rounded-2xl font-black text-slate-900 shadow-lg mt-4">ADD PLAN</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="bg-white border-t-2 border-slate-100 flex justify-around p-4 pb-10 shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)] z-10">
                        <button onClick={() => setActiveTab('Trip')} className={`flex flex-col items-center ${activeTab === 'Trip' ? 'text-yellow-500' : 'text-slate-300'}`}><i data-lucide="calendar"></i><span className="text-[9px] mt-1 font-black">TRIP</span></button>
                        <button onClick={() => setActiveTab('Chat')} className={`flex flex-col items-center ${activeTab === 'Chat' ? 'text-yellow-500' : 'text-slate-300'}`}><i data-lucide="message-square"></i><span className="text-[9px] mt-1 font-black">CHAT</span></button>
                        <button onClick={() => setActiveTab('ID')} className={`flex flex-col items-center ${activeTab === 'ID' ? 'text-yellow-500' : 'text-slate-300'}`}><i data-lucide="user"></i><span className="text-[9px] mt-1 font-black">ID</span></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
