<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotatoPlan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap');
        .logo-font { font-family: 'Dela Gothic One', cursive; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('My Trip');
            const [visibleMembers, setVisibleMembers] = useState(['ALL', 'Yuki', 'Ken', 'Mika']);

            // アイコンを強制的に再描画するおまじない
            useEffect(() => {
                lucide.createIcons();
            }, [activeTab]);

           const members = [
                { id: 'ALL', name: '全員' },
                { id: 'Member1', name: '名前1' },
                { id: 'Member2', name: '名前2' },
                { id: 'Member3', name: '名前3' },
                { id: 'Member4', name: '名前4' },
                { id: 'Member5', name: '名前5' },
                { id: 'Member6', name: '名前6' },
                { id: 'Member7', name: '名前7' },
                { id: 'Member8', name: '名前8' },
                { id: 'Member9', name: '名前9' },
                { id: 'Member10', name: '名前10' },
            ];

            const events = [
                { time: '09:00', title: '朝市の朝食', type: 'SHARED', owner: 'ALL' },
                { time: '10:30', title: '集中作業タイム', type: 'PERSONAL', owner: 'Yuki' },
                { time: '10:30', title: 'クライアントMTG', type: 'PERSONAL', owner: 'Ken' },
                { time: '13:00', title: 'シーサイド・コワーキング', type: 'SHARED', owner: 'ALL' },
            ];

            return (
                <div className="max-w-md mx-auto h-screen bg-white flex flex-col shadow-2xl relative overflow-hidden">
                    {/* Header */}
                    <header className="bg-yellow-400 p-6 text-slate-800 shadow-sm">
                        <h1 className="text-3xl logo-font tracking-tighter">PotatoPlan</h1>
                        <div className="mt-2 text-center text-xs font-bold bg-white/50 rounded-full py-1">
                             函館ワーケーション Day 1
                        </div>
                    </header>

                    {/* Member Tabs */}
                    <div className="flex gap-4 p-4 overflow-x-auto border-b bg-slate-50">
                        {members.map(m => (
                            <div key={m.id} 
                                 onClick={() => m.id !== 'ALL' && setVisibleMembers(prev => prev.includes(m.id) ? prev.filter(x => x !== m.id) : [...prev, m.id])}
                                 className={`cursor-pointer flex flex-col items-center min-w-[60px] p-2 rounded-xl transition-all ${visibleMembers.includes(m.id) ? 'bg-white shadow-md ring-2 ring-yellow-400' : 'opacity-40'}`}>
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold mb-1 ${m.id === 'ALL' ? 'bg-slate-800' : 'bg-blue-400'}`}>
                                    {m.name}
                                </div>
                                <span className="text-[10px] font-bold">{m.name}</span>
                            </div>
                        ))}
                    </div>

                    {/* Timeline */}
                    <main className="flex-1 overflow-y-auto p-6 bg-white">
                        <div className="border-l-2 border-yellow-100 ml-2 pl-6 space-y-8">
                            {events.filter(e => visibleMembers.includes(e.owner)).map((event, i) => (
                                <div key={i} className="relative">
                                    <div className="absolute -left-[33px] top-1 w-4 h-4 rounded-full bg-yellow-400 border-2 border-white"></div>
                                    <div className="text-[10px] font-black text-slate-300 mb-1">{event.time}</div>
                                    <div className={`p-4 rounded-2xl shadow-sm border ${event.type === 'SHARED' ? 'bg-green-50 border-green-200' : 'bg-slate-50 border-slate-100'}`}>
                                        <div className="flex justify-between items-center text-sm font-bold text-slate-700">
                                            {event.title}
                                            <span className="text-[8px] px-2 py-0.5 bg-white rounded-full border">{event.type}</span>
                                        </div>
                                        {event.owner !== 'ALL' && <div className="text-[10px] text-blue-500 mt-2 font-bold">Member: {event.owner}</div>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Bottom Nav */}
                    <nav className="bg-white border-t flex justify-around p-4 pb-8">
                        <div className="text-yellow-600 flex flex-col items-center"><i data-lucide="calendar"></i><span className="text-[10px] mt-1 font-bold">Trip</span></div>
                        <div className="text-slate-400 flex flex-col items-center"><i data-lucide="message-square"></i><span className="text-[10px] mt-1 font-bold">Chat</span></div>
                        <div className="text-slate-400 flex flex-col items-center"><i data-lucide="map-pin"></i><span className="text-[10px] mt-1 font-bold">Map</span></div>
                        <div className="text-slate-400 flex flex-col items-center"><i data-lucide="user"></i><span className="text-[10px] mt-1 font-bold">ID</span></div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
