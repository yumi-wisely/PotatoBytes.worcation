<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotatoPlan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap');.logo-font{font-family:'Dela Gothic One',cursive;}body{background-color:#f1f5f9;}</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = {
          apiKey: "AIzaSyCcRLNQUUqgoIeLrudKJ9IsClwuc93WwHM",
          authDomain: "potatoplan-9dedc.firebaseapp.com",
          projectId: "potatoplan-9dedc",
          storageBucket: "potatoplan-9dedc.firebasestorage.app",
          messagingSenderId: "759154119060",
          appId: "1:759154119060:web:665a705e2f848d4dce3f81",
          databaseURL: "https://potatoplan-9dedc-default-rtdb.firebaseio.com"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const App = () => {
            const [view, setView] = useState('TripList');
            const [activeTab, setActiveTab] = useState('Trip'); // Trip or ID
            const [user, setUser] = useState(null);
            const [potatoId, setPotatoId] = useState(null);
            const [events, setEvents] = useState([]);
            const [friends, setFriends] = useState([]);
            const [tripMembers, setTripMembers] = useState([{ id: 'ALL', name: '全員' }]);
            const [showAddModal, setShowAddModal] = useState(false);
            const [showSummonModal, setShowSummonModal] = useState(false);
            const [summonId, setSummonId] = useState('');
            const [newPlan, setNewPlan] = useState({ time: '12:00', title: '', type: 'SHARED' });

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const doc = await db.collection('users').doc(u.uid).get();
                        if (doc.exists()) {
                            const d = doc.data();
                            setPotatoId(d.potatoId);
                            const me = { id: d.potatoId, name: u.displayName, photo: u.photoURL };
                            setTripMembers(p => p.find(m => m.id === me.id) ? p : [...p, me]);
                        }
                    } else { setUser(null); setPotatoId(null); setView('TripList'); }
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (view === 'MainApp') {
                    const unsub = db.collection('events').orderBy('time').onSnapshot(s => {
                        setEvents(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                    return () => unsub();
                }
            }, [view]);

            // QRコード生成
            useEffect(() => {
                if (activeTab === 'ID' && potatoId) {
                    const el = document.getElementById('qrcode');
                    if (el) {
                        el.innerHTML = '';
                        new QRCode(el, { text: potatoId, width: 140, height: 140 });
                    }
                }
                if (window.lucide) window.lucide.createIcons();
            }, [view, activeTab, potatoId, friends, tripMembers, events]);

            const handleAddFriend = async () => {
                if (!summonId) return;
                const s = await db.collection('users').where('potatoId', '==', summonId.toUpperCase()).get();
                if (s.empty) { alert("ポテト不在🍟"); return; }
                const f = s.docs.data();
                setFriends(p => p.find(x => x.id === f.potatoId) ? p : [...p, { id: f.potatoId, name: f.displayName, photo: f.photoURL }]);
                setSummonId('');
            };

            if (view === 'TripList') {
                return (
                    <div className="max-w-md mx-auto h-screen p-6 bg-slate-50 overflow-y-auto">
                        <h1 className="text-4xl logo-font mb-8 mt-10 text-slate-800">My Trips</h1>
                        <div className="bg-yellow-400 p-8 rounded-[32px] shadow-lg mb-10 cursor-pointer border-b-8 border-yellow-600 active:translate-y-1 active:border-b-0" onClick={() => setView('MainApp')}>
                            <h3 className="text-2xl font-black uppercase italic">HAKODATE</h3>
                            <p className="text-xs font-bold opacity-60 mt-1 uppercase tracking-widest">Worcation 2026</p>
                        </div>
                        <h2 className="text-xl font-black mb-4 flex items-center gap-2">🤝 POTATO FRIENDS</h2>
                        <div className="space-y-3 mb-20">
                            {friends.map(f => (
                                <div key={f.id} className="bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border">
                                    <div className="flex items-center gap-3">
                                        <img src={f.photo} className="w-10 h-10 rounded-full border" />
                                        <span className="font-bold">{f.name}</span>
                                    </div>
                                    <span className="text-[10px] font-mono bg-slate-100 p-1 rounded">{f.id}</span>
                                </div>
                            ))}
                            <div className="flex gap-2 mt-4 pt-4 border-t">
                                <input type="text" value={summonId} onChange={e => setSummonId(e.target.value)} placeholder="PBID-XXXX" className="flex-1 border-2 p-3 rounded-xl uppercase font-bold text-sm" />
                                <button onClick={handleAddFriend} className="bg-slate-900 text-white px-6 rounded-xl font-black text-xs">追加</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto h-screen bg-white flex flex-col shadow-2xl relative overflow-hidden">
                    <header className="bg-yellow-400 p-6 flex items-center justify-between shadow-sm">
                        <button onClick={() => setView('TripList')} className="p-2"><i data-lucide="chevron-left"></i></button>
                        <h1 className="text-2xl logo-font uppercase tracking-tighter">Hakodate</h1>
                        <button onClick={() => setShowSummonModal(true)} className="bg-slate-900 text-white text-[10px] px-3 py-1 rounded-full font-black">召喚</button>
                    </header>

                    <main className="flex-1 overflow-y-auto">
                        {activeTab === 'ID' ? (
                            <div className="p-8 flex flex-col items-center animate-bounce-in">
                                <h2 className="text-xl font-black mb-8 italic uppercase tracking-widest">My Identity</h2>
                                {user ? (
                                    <div className="bg-yellow-50 p-8 rounded-[40px] border-2 border-yellow-200 w-full flex flex-col items-center shadow-inner">
                                        <img src={user.photoURL} className="w-20 h-20 rounded-full mb-4 border-4 border-white shadow-md"/>
                                        <p className="font-black text-lg">{user.displayName}</p>
                                        <div id="qrcode" className="p-3 bg-white rounded-2xl shadow-inner my-6 border border-yellow-100"></div>
