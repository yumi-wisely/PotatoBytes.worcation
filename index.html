<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotatoPlan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap');
        .logo-font { font-family: 'Dela Gothic One', cursive; }
        body { background-color: #f1f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ⚠️ ここに自分のFirebase設定をコピーして貼り付けてね ---
        const firebaseConfig = {
          apiKey: "YOUR_API_KEY",
          authDomain: "YOUR_AUTH_DOMAIN",
          projectId: "YOUR_PROJECT_ID",
          storageBucket: "YOUR_STORAGE_BUCKET",
          messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
          appId: "YOUR_APP_ID"
        };

        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const App = () => {
            const [activeTab, setActiveTab] = useState('Trip');
            const [visibleMembers, setVisibleMembers] = useState(['ALL']);
            const [user, setUser] = useState(null);
            const [potatoId, setPotatoId] = useState(null);

            const members = [
                { id: 'ALL', name: '全員' },
                { id: 'M1', name: '名前1' }, { id: 'M2', name: '名前2' },
                { id: 'M3', name: '名前3' }, { id: 'M4', name: '名前4' },
                { id: 'M5', name: '名前5' }, { id: 'M6', name: '名前6' },
                { id: 'M7', name: '名前7' }, { id: 'M8', name: '名前8' },
                { id: 'M9', name: '名前9' }, { id: 'M10', name: '名前10' }
            ];

            const events = [
                { time: '09:00', title: '朝市の朝食', type: 'SHARED', owner: 'ALL' },
                { time: '13:00', title: 'コワーキング', type: 'SHARED', owner: 'ALL' },
                { time: '19:00', title: 'ジンギスカンパーティー', type: 'SHARED', owner: 'ALL' }
            ];

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const doc = await db.collection('users').doc(u.uid).get();
                        if (doc.exists()) setPotatoId(doc.data().potatoId);
                    } else {
                        setUser(null);
                        setPotatoId(null);
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                lucide.createIcons();
                if (activeTab === 'ID' && potatoId) {
                    const qrContainer = document.getElementById('qrcode');
                    if (qrContainer) {
                        qrContainer.innerHTML = '';
                        new QRCode(qrContainer, { text: potatoId, width: 140, height: 140 });
                    }
                }
            }, [activeTab, potatoId]);

            const signIn = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    const result = await auth.signInWithPopup(provider);
                    const u = result.user;
                    const userRef = db.collection('users').doc(u.uid);
                    const userDoc = await userRef.get();
                    if (!userDoc.exists()) {
                        const newId = 'PBID-' + Math.random().toString(36).substring(2, 9).toUpperCase();
                        await userRef.set({
                            displayName: u.displayName,
                            potatoId: newId,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        setPotatoId(newId);
                    }
                } catch (e) {
                    console.error(e);
                    alert("ログインに失敗しました。設定を確認してください。");
                }
            };

            return (
                <div className="max-w-md mx-auto h-screen bg-white flex flex-col shadow-2xl relative overflow-hidden font-sans border-x border-slate-200">
                    <header className="bg-yellow-400 p-6 text-slate-800 shadow-sm flex flex-col items-center">
                        <h1 className="text-3xl logo-font tracking-tighter text-slate-900">PotatoPlan</h1>
                        <div className="mt-2 text-[10px] font-black bg-white/40 px-3 py-1 rounded-full uppercase tracking-widest text-slate-700">Hakodate Worcation</div>
                    </header>

                    <main className="flex-1 overflow-y-auto bg-white">
                        {activeTab === 'ID' ? (
                            <div className="p-8 flex flex-col items-center space-y-6">
                                <h2 className="text-xl font-black text-slate-800 uppercase tracking-tight">Your Potato ID</h2>
                                {user ? (
                                    <div className="bg-yellow-50 p-8 rounded-[40px] border-2 border-yellow-200 w-full flex flex-col items-center shadow-lg">
                                        <img src={user.photoURL} className="w-20 h-20 rounded-full mb-4 border-4 border-white shadow-md"/>
                                        <p className="font-black text-lg text-slate-700">{user.displayName}</p>
                                        <div id="qrcode" className="p-3 bg-white rounded-2xl shadow-inner my-6 border border-yellow-100"></div>
                                        <p className="text-2xl font-black logo-font text-slate-800 bg-white px-4 py-1 rounded-lg border shadow-sm">{potatoId}</p>
                                        <button onClick={() => auth.signOut()} className="mt-10 text-[10px] text-slate-400 font-bold uppercase tracking-widest">Sign Out</button>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center space-y-8 py-10">
                                        <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center text-slate-200 border-2 border-dashed border-slate-200">
                                            <i data-lucide="user" size={48}></i>
                                        </div>
                                        <button onClick={signIn} className="bg-white border-2 border-slate-800 px-8 py-4 rounded-full font-black text-slate-800 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center gap-3">
                                            <img src="https://authjs.dev/img/providers/google.svg" className="w-5 h-5"/>
                                            LOGIN WITH GOOGLE
                                        </button>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <>
                                <div className="flex gap-4 p-4 overflow-x-auto border-b bg-slate-50 sticky top-0 z-10 no-scrollbar">
                                    {members.map(m => (
                                        <div key={m.id} onClick={() => m.id !== 'ALL' && setVisibleMembers(prev => prev.includes(m.id) ? prev.filter(x => x !== m.id) : [...prev, m.id])}
                                             className={`cursor-pointer flex flex-col items-center min-w-[65px] p-2 rounded-2xl transition-all ${visibleMembers.includes(m.id) ? 'bg-white shadow-md ring-2 ring-yellow-400' : 'opacity-30'}`}>
                                            <div className={`w-12 h-12 rounded-full flex items-center justify-center text-white font-black mb-1 text-lg ${m.id === 'ALL' ? 'bg-slate-800' : 'bg-blue-500'}`}>{m.name}</div>
                                            <span className="text-[10px] font-black text-slate-600 truncate w-full text-center">{m.name}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-8 border-l-4 border-yellow-100 ml-8 space-y-10 mt-4">
                                    {events.filter(e => visibleMembers.includes(e.owner)).map((event, i) => (
                                        <div key={i} className="relative">
                                            <div className="absolute -left-[40px] top-1 w-6 h-6 rounded-full bg-yellow-400 border-4 border-white shadow-sm"></div>
                                            <div className="text-[10px] font-black text-slate-300 mb-2 tracking-widest uppercase">{event.time}</div>
                                            <div className="p-5 rounded-[24px] bg-slate-50 border-2 border-slate-100 shadow-sm">
                                                <div className="text-md font-black text-slate-700">{event.title}</div>
                                                <div className="mt-2 text-[9px] font-bold text-slate-400 uppercase">{event.type}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </>
                        )}
                    </main>

                    <nav className="bg-white border-t-2 border-slate-100 flex justify-around p-4 pb-10 shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)]">
                        <button onClick={() => setActiveTab('Trip')} className={`flex flex-col items-center ${activeTab === 'Trip' ? 'text-yellow-500' : 'text-slate-300'}`}><i data-lucide="calendar"></i><span className="text-[9px] mt-1 font-black uppercase">Trip</span></button>
                        <button onClick={() => setActiveTab('Chat')} className={`flex flex-col items-center ${activeTab === 'Chat' ? 'text-yellow-500' : 'text-slate-300'}`}><i data-lucide="message-square"></i><span className="text-[9px] mt-1 font-black uppercase">Chat</span></button>
                        <button onClick={() => setActiveTab('Map')} className={`flex flex-col items-center ${activeTab === 'Map' ? 'text-yellow-500' : 'text-slate-300'}`}><i data-lucide="map-pin"></i><span className="text-[9px] mt-1 font-black uppercase">Map</span></button>
                        <button onClick={() => setActiveTab('ID')} className={`flex flex-col items-center ${activeTab === 'ID' ? 'text-yellow-500' : 'text-slate-300'}`}><i data-lucide="user"></i><span className="text-[9px] mt-1 font-black uppercase">ID</span></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
