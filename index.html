<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotatoPlan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap');
        .logo-font { font-family: 'Dela Gothic One', cursive; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ⚠️ Firebase設定 (後で書き換える場所) ---
        const firebaseConfig = {
          apiKey: "YOUR_API_KEY",
          authDomain: "YOUR_AUTH_DOMAIN",
          projectId: "YOUR_PROJECT_ID",
          storageBucket: "YOUR_STORAGE_BUCKET",
          messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
          appId: "YOUR_APP_ID"
        };

        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const App = () => {
            const [activeTab, setActiveTab] = useState('My Trip');
            const [visibleMembers, setVisibleMembers] = useState(['ALL']);
            const [user, setUser] = useState(null);
            const [potatoId, setPotatoId] = useState(null);

            // データ定義（10人分）
            const members = [
                { id: 'ALL', name: '全員' },
                { id: 'Member1', name: '名前1' }, { id: 'Member2', name: '名前2' },
                { id: 'Member3', name: '名前3' }, { id: 'Member4', name: '名前4' },
                { id: 'Member5', name: '名前5' }, { id: 'Member6', name: '名前6' },
                { id: 'Member7', name: '名前7' }, { id: 'Member8', name: '名前8' },
                { id: 'Member9', name: '名前9' }, { id: 'Member10', name: '名前10' }
            ];

            const events = [
                { time: '09:00', title: '朝市の朝食', type: 'SHARED', owner: 'ALL' },
                { time: '13:00', title: 'シーサイド・コワーキング', type: 'SHARED', owner: 'ALL' },
                { time: '18:00', title: 'ジンギスカン', type: 'SHARED', owner: 'ALL' }
            ];

            // ログイン監視
            useEffect(() => {
              const unsubscribe = auth.onAuthStateChanged(async (u) => {
                if (u) {
                  setUser(u);
                  const doc = await db.collection('users').doc(u.uid).get();
                  if (doc.exists()) setPotatoId(doc.data().potatoId);
                } else {
                  setUser(null);
                  setPotatoId(null);
                }
              });
              return () => unsubscribe();
            }, []);

            // アイコン & QR生成
            useEffect(() => {
                lucide.createIcons();
                if (activeTab === 'Profile' && potatoId) {
                  const qrContainer = document.getElementById('qrcode');
                  if (qrContainer) {
                    qrContainer.innerHTML = '';
                    new QRCode(qrContainer, { text: potatoId, width: 128, height: 128 });
                  }
                }
            }, [activeTab, potatoId]);

            const signIn = async () => {
              const provider = new firebase.auth.GoogleAuthProvider();
              try {
                const result = await auth.signInWithPopup(provider);
                const u = result.user;
                const userRef = db.collection('users').doc(u.uid);
                const userDoc = await userRef.get();
                if (!userDoc.exists()) {
                  const newId = 'PBID-' + Math.random().toString(36).substring(2, 9).toUpperCase();
                  await userRef.set({
                    displayName: u.displayName,
                    potatoId: newId,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                  });
                  setPotatoId(newId);
                }
              } catch (e) { console.error(e); alert("Firebase設定が必要です"); }
            };

            return (
                <div className="max-w-md mx-auto h-screen bg-white flex flex-col shadow-2xl relative overflow-hidden font-sans">
                    <header className="bg-yellow-400 p-6 text-slate-800 shadow-sm">
                        <h1 className="text-3xl logo-font tracking-tighter text-center">PotatoPlan</h1>
                    </header>

                    <main className="flex-1 overflow-y-auto bg-white">
                        {activeTab === 'Profile' ? (
                            <div className="p-8 flex flex-col items-center space-y-6">
                                <h2 className="text-xl font-bold">My Potato ID</h2>
                                {user ? (
                                    <div className="bg-yellow-50 p-6 rounded-3xl border border-yellow-200 w-full flex flex-col items-center shadow-inner">
                                        <img src={user.photoURL} className="w-16 h-16 rounded-full mb-4 border-2 border-white shadow-md"/>
                                        <p className="font-bold">{user.displayName}</p>
                                        <div id="qrcode" className="p-2 bg-white rounded-xl shadow-md my-4"></div>
                                        <p className="text-xl font-black logo-font">{potatoId}</p>
                                        <button onClick={() => auth.signOut()} className="mt-8 text-xs text-slate-400 underline">ログアウト</button>
                                    </div>
                                ) : (
                                    <button onClick={signIn} className="bg-white border p-4 rounded-full font-bold shadow-sm flex items-center gap-3">
                                        <img src="https://authjs.dev/img/providers/google.svg" className="w-5 h-5"/> Googleでログイン
                                    </button>
                                )}
                            </div>
                        ) : (
                            <>
                                <div className="flex gap-4 p-4 overflow-x-auto border-b bg-slate-50 sticky top-0 z-10">
                                    {members.map(m => (
                                        <div key={m.id} onClick={() => m.id !== 'ALL' && setVisibleMembers(prev => prev.includes(m.id) ? prev.filter(x => x !== m.id) : [...prev, m.id])}
                                             className={`cursor-pointer flex flex-col items-center min-w-[60px] p-2 rounded-xl transition-all ${visibleMembers.includes(m.id) ? 'bg-white shadow-md ring-2 ring-yellow-400' : 'opacity-40'}`}>
                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold mb-1 ${m.id === 'ALL' ? 'bg-slate-800' : 'bg-blue-400'}`}>{m.name}</div>
                                            <span className="text-[10px] font-bold">{m.name}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-6 border-l-2 border-yellow-100 ml-6 space-y-8 mt-4">
                                    {events.filter(e => visibleMembers.includes(e.owner)).map((event, i) => (
                                        <div key={i} className="relative">
                                            <div className="absolute -left-[33px] top-1 w-4 h-4 rounded-full bg-yellow-400 border-2 border-white"></div>
                                            <div className="text-[10px] font-black text-slate-300 mb-1">{event.time}</div>
                                            <div className="p-4 rounded-2xl bg-slate-50 border border-slate-100 shadow-sm">
                                                <div className="text-sm font-bold">{event.title}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </>
                        )}
                    </main>

                    <nav className="bg-white border-t flex justify-around p-4 pb-8">
                        <button onClick={() => setActiveTab('My Trip')} className={`flex flex-col items-center ${activeTab === 'My Trip' ? 'text-yellow-600' : 'text-slate-400'}`}><i data-lucide="calendar"></i><span className="text-[10px] mt-1 font-bold">Trip</span></button>
                        <button onClick={() => setActiveTab('Chat')} className={`flex flex-col items-center ${activeTab === 'Chat' ? 'text-yellow-600' : 'text-slate-400'}`}><i data-lucide="message-square"></i><span className="text-[10px] mt-1 font-bold">Chat</span></button>
                        <button onClick={() => setActiveTab('Map')} className={`flex flex-col items-center ${activeTab === 'Map' ? 'text-yellow-600' : 'text-slate-400'}`}><i data-lucide="map-pin"></i><span className="text-[10px] mt-1 font-bold">Map</span></button>
                        <button onClick={() => setActiveTab('Profile')} className={`flex flex-col items-center ${activeTab === 'Profile' ? 'text-yellow-60
